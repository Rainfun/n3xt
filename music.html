<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAPOR — Music</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">
  <style>
    :root {
      --bg: #0a111d; --secondary-bg: #2b384d; --third-bg: #444f60;
      --fourth-bg: #212630; --text-color: #d5dce8;
      --accent: #a4b8db; --cb: 255,255,255;
    }
    *,*::before,*::after { box-sizing: border-box; }
    html,body {
      margin: 0; height: 100%; background: var(--bg);
      display: flex; justify-content: center; align-items: center;
      font-family: "Inter", sans-serif; overflow: hidden;
    }
    .wrapper {
      display: flex; gap: 14px; width: 750px; height: 600px;
      transform-origin: center center;
      transition: transform .15s ease, gap .5s cubic-bezier(.25,.8,.25,1);
      position: relative;
    }
    .wrapper.lyrics-mode { gap: 0; }
    .box {
      min-width: 0; border-radius: 20px; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; padding: 10px;
      flex-shrink: 0; background: var(--fourth-bg);
      border: 1.5px solid rgba(var(--cb),.08);
    }
    .left {
      display: flex; flex-direction: row; align-items: stretch;
      width: 368px; position: relative;
      transition: width .5s cubic-bezier(.25,.8,.25,1); z-index: 2;
    }
    .left-content-wrapper {
      display: flex; flex-direction: column; align-items: center;
      width: 348px; min-width: 348px; height: 100%; flex-shrink: 0;
    }
    .left-inner {
      width: 100%; display: flex; flex-direction: column;
      align-items: flex-start; flex: 1; min-height: 0; overflow: hidden; margin-left: -3px;
    }
    .wrapper.lyrics-mode .left { width: 750px; }
    .wrapper.lyrics-mode .right {
      width: 0; opacity: 0; padding: 0; border-width: 0;
      transform: scale(.97) translateX(-15px); pointer-events: none;
    }
    .right {
      display: block; width: 368px; position: relative; padding-top: 10px;
      transform-origin: center right;
      transition: width .5s cubic-bezier(.25,.8,.25,1), opacity .4s ease,
        transform .5s cubic-bezier(.25,.8,.25,1), border-width .3s ease, padding .5s ease;
    }
    .right-inner-wrapper {
      position: absolute; top: 10px; right: 8px; bottom: 10px; width: 348px;
      display: flex; flex-direction: column; align-items: center;
    }
    .cover-art {
      position: relative; width: 100%; aspect-ratio: 1/1;
      background: rgba(var(--cb),.1); border-radius: 14px;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden; flex-shrink: 0; transition: background .4s ease;
    }
    .cover-art img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 14px;
      transition: transform .4s ease, opacity .4s ease;
    }
    .cover-art.paused img { transform: scale(.9); opacity: .8; }
    .cover-art i { font-size: 8rem; color: rgba(var(--cb),.15); }
    .song-info-wrapper { width: 100%; margin-top: 10px; margin-bottom: 3px; }
    .song-title-row { display: flex; align-items: center; width: 100%; margin-bottom: 5px; min-width: 0; }
    #songTitle {
      display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      font-size: 1.2rem; font-weight: 600; line-height: 1.2; margin: 0;
      color: var(--text-color); max-width: calc(100% - 50px);
    }
    .song-artist {
      color: rgba(var(--cb),.65); display: block; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis; width: 100%; font-size: 1.1rem; line-height: 1.2; margin: 0;
    }
    .eq-visualizer { display: flex; align-items: center; height: 1.2em; gap: 2px; margin-right: 8px; min-width: 16px; flex-shrink: 0; }
    .eq-bar { width: 3.5px; background: rgba(var(--cb)); border-radius: 4px; height: 100%; transform: scaleY(.1); transition: .15s ease; }
    .eq-visualizer:not(.playing) .eq-bar { background: rgba(var(--cb),.3); transform: scaleY(.1); }
    .eq-visualizer.playing .eq-bar { background: var(--accent); }
    .progress-wrapper { width: 100%; height: 35px; display: flex; flex-direction: column; margin-bottom: -18px; flex-shrink: 0; }
    .progress-bar {
      width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
      background: rgba(var(--cb),.2); border-radius: 3px; cursor: pointer; margin-bottom: 5px; accent-color: var(--accent);
    }
    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none; width: 15px; height: 15px;
      background: var(--accent); border-radius: 50%; margin-top: -4.5px; opacity: 0; transition: opacity .3s ease;
    }
    .progress-bar.visible::-webkit-slider-thumb { opacity: 1; }
    .progress-times { width: 100%; display: flex; justify-content: space-between; color: rgba(var(--cb),.5); font-size: .9rem; }
    .player-controls-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; margin: 32px 0; flex-shrink: 0; }
    .controls { position: relative; display: block; width: 100%; padding: 0 20px; }
    .controls .main-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 0 auto; width: min-content; }
    .controls button { background: none; border: none; color: rgba(var(--cb),.8); font-size: 3rem; cursor: pointer; transition: .25s ease, transform .2s ease; }
    .controls .main-controls button:hover { transform: scale(1.05); color: rgba(var(--cb)); }
    .controls .play-button { font-size: 4rem; }
    #loopButton, #lyricsButton {
      position: absolute; bottom: 12px; background: none; border: none;
      color: rgba(var(--cb),.35); font-size: 1.8rem; cursor: pointer; z-index: 10;
      transition: all .3s cubic-bezier(.175,.885,.32,1.275);
    }
    #loopButton { left: 12px; } #lyricsButton { right: 12px; }
    #loopButton:hover, #lyricsButton:hover { color: var(--accent); }
    #loopButton.active { color: var(--accent); transform: scale(1.2); text-shadow: 0 0 15px var(--accent); }
    #nowPlayingHeart {
      margin-left: auto; font-size: 1.3rem; flex-shrink: 0;
      color: rgba(var(--cb),.4); cursor: pointer; transition: all .2s ease;
    }
    #nowPlayingHeart:hover { color: var(--accent); transform: scale(1.15); }
    #nowPlayingHeart.fav { color: var(--accent); }
    .lyrics-view {
      position: absolute; right: 0; top: 0; bottom: 0; width: 360px;
      display: flex; flex-direction: column; align-items: flex-start;
      opacity: 0; pointer-events: none; padding: 20px 20px 20px 0; transform: scale(.95);
      transition: opacity 0s, transform 0s; overflow-y: auto; scroll-behavior: auto;
      mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
    }
    .lyrics-view::-webkit-scrollbar { display: none; }
    .wrapper.lyrics-mode .lyrics-view {
      opacity: 1; transform: scale(1); pointer-events: all;
      transition: opacity .4s ease .45s, transform .4s cubic-bezier(.25,.8,.25,1) .45s;
    }
    .lyrics-content-spacer { width: 100%; min-height: 50%; flex-shrink: 0; }
    .lyrics-scroll-container { width: 100%; display: flex; flex-direction: column; }
    .lyric-line {
      font-size: 1.8rem; color: rgba(var(--cb),.4); font-weight: 700; text-align: left;
      margin-bottom: 24px; transform-origin: left center;
      transition: transform .9s cubic-bezier(.25,1,.5,1), opacity .6s ease, filter .6s ease, color .4s ease;
      filter: blur(1px); line-height: 1.3; opacity: .5; cursor: pointer;
    }
    .lyric-line.active { color: rgba(var(--cb)); transform: scale(1.02); filter: blur(0); opacity: 1; }
    .lyric-line.active.paused { opacity: .7; color: rgba(var(--cb),.85); transform: scale(1); }
    .lyric-line.past { opacity: 0; filter: blur(4px); pointer-events: none; }
    .lyric-line.future { opacity: .35; filter: blur(1.5px); }
    .lyric-line.future-1 { filter: blur(1.5px); }
    .lyric-line.future-2 { transform: scale(.98); filter: blur(2.5px); }
    .lyric-line.future-3 { transform: scale(.96); filter: blur(3.5px); }
    .lyric-line.future-4 { transform: scale(.94); filter: blur(4.5px); }
    .lyric-line.future-5 { transform: scale(.92); filter: blur(5.5px); }
    .lyrics-view.manual-mode .lyric-line { opacity: .4; filter: blur(1px); transform: scale(1) !important; pointer-events: auto !important; }
    .lyrics-view.manual-mode .lyric-line.active { opacity: 1; color: rgba(var(--cb)); }
    .lyrics-view.manual-mode .lyric-line.past { opacity: .4; }
    .lyrics-status-container {
      height: 100%; width: 100%; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 10px; color: rgba(var(--cb),.3); font-size: 1rem;
    }
    .lyrics-status-container i { font-size: 2rem; }
    .view-section {
      position: absolute; inset: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      transition: opacity .4s ease, transform .4s cubic-bezier(.25,.8,.25,1);
      background: var(--fourth-bg); border-radius: 12px;
    }
    .view-hidden { opacity: 0; transform: scale(.98); pointer-events: none; z-index: 0; }
    .view-active { opacity: 1; transform: scale(1); pointer-events: all; z-index: 10; }
    .right-search {
      width: 100%; background: rgba(var(--cb),.1); border-radius: 12px;
      display: flex; align-items: center; padding: 14px 16px; flex-shrink: 0; margin-bottom: 10px;
    }
    .right-search i { color: rgba(var(--cb),.45); font-size: 1.5rem; flex-shrink: 0; }
    .right-search i.ri-search-line { margin-right: 10px; }
    .right-search input {
      background: none; border: none; outline: none;
      color: var(--text-color); font-size: 1.2rem; font-family: "Inter",sans-serif; flex-grow: 1;
    }
    .right-search input::placeholder { color: rgba(var(--cb),.45); }
    .search-results {
      width: 100%; flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px; padding-right: 4px;
    }
    .search-results::-webkit-scrollbar { width: 4px; }
    .search-results::-webkit-scrollbar-thumb { background: rgba(var(--cb),.15); border-radius: 4px; }
    .result-item {
      width: 100%; height: 70px; background: rgba(var(--cb),.06); border-radius: 12px;
      display: flex; align-items: center; padding: 8px; cursor: pointer;
      flex-shrink: 0; position: relative; transition: background .2s ease;
    }
    .result-item:hover { background: var(--third-bg); }
    .result-item.active { background: color-mix(in srgb, var(--accent) 25%, var(--fourth-bg)); }
    .result-item:hover .result-art { transform: scale(1.04); }
    .result-art {
      width: 54px; height: 54px; background: rgba(var(--cb),.08); border-radius: 8px;
      flex-shrink: 0; overflow: hidden; margin-right: 12px;
      transition: transform .2s ease; display: flex; justify-content: center; align-items: center;
    }
    .result-art img { width: 100%; height: 100%; object-fit: cover; }
    .result-art i { font-size: 1.5rem; color: rgba(var(--cb),.7); }
    .result-text { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
    .result-title, .result-artist { display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; width: 100%; font-size: 1.1rem; line-height: 1.2; }
    .result-title { color: var(--text-color); margin-bottom: 3px; }
    .result-artist { color: rgba(var(--cb),.45); }
    .favorite-btn { opacity: 0; color: rgba(var(--cb),.4); font-size: 1.2rem; padding: 8px; transition: opacity .2s ease, color .2s ease, transform .2s ease; }
    .result-item:hover .favorite-btn { opacity: 1; }
    .ri-heart-fill.favorite-btn { color: var(--accent); opacity: 1; }
    .favorite-btn:hover { transform: scale(1.1); color: var(--accent); }
    .quality-badge {
      font-size: .65rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      padding: 2px 5px; border-radius: 5px; flex-shrink: 0; margin-left: 5px;
      background: rgba(var(--cb),.1); color: rgba(var(--cb),.45); vertical-align: middle;
    }
    .quality-badge.lossless { background: rgba(164,184,219,.15); color: #a4b8db; }
    .quality-badge.hires { background: rgba(255,215,100,.15); color: #ffd764; }
    .skeleton-item { width: 100%; height: 70px; background: rgba(var(--cb),.06); border-radius: 12px; flex-shrink: 0; animation: pulse 1.8s infinite ease-in-out; }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }
    .loading-wave { display: flex; gap: 5px; align-items: center; }
    .dot { width: 8px; height: 8px; background: rgba(var(--cb),.4); border-radius: 50%; animation: dotB 1.2s infinite ease-in-out; }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes dotB { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 100%; color: rgba(var(--cb),.3); text-align: center; }
    .empty-state i { font-size: 3rem; }
    .empty-state span { font-size: .95rem; }
    #instanceStatus { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: .72rem; color: rgba(var(--cb),.25); white-space: nowrap; pointer-events: none; }
    #modalOverlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity .2s ease; }
    #modalOverlay.visible { display: flex; opacity: 1; }
    #failModal { background: var(--fourth-bg); border-radius: 18px; padding: 12px; width: 340px; color: var(--text-color); font-size: 1.1rem; transform: scale(.98); transition: transform .2s ease; border: 1.5px solid rgba(var(--cb),.08); }
    #modalOverlay.visible #failModal { transform: scale(1); }
    #modalContent { margin: 8px 8px 20px; }
    #modalButtonContainer { display: flex; justify-content: flex-end; }
    #modalButton { background: var(--accent); color: var(--bg); font-family: "Inter",sans-serif; font-weight: bold; border: none; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; transition: filter .2s ease; }
    #modalButton:hover { filter: brightness(1.2); }
  </style>
</head>
<body>
<audio id="audioEl" preload="auto" crossorigin="anonymous"></audio>

<div class="wrapper" id="wrapper">
  <div class="box left">
    <div class="left-content-wrapper">
      <div class="left-inner">
        <div class="cover-art" id="coverArt"><i class="ri-music-2-fill"></i></div>
        <div class="song-info-wrapper">
          <div class="song-title-row">
            <div class="eq-visualizer" id="eqVisualizer">
              <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            </div>
            <div id="songTitle">VAPOR Music</div>
            <i class="ri-heart-line" id="nowPlayingHeart"></i>
          </div>
          <div class="song-artist" id="songArtist">Search a song to begin</div>
        </div>
      </div>
      <div class="progress-wrapper">
        <input type="range" min="0" max="100" value="0" class="progress-bar" id="progressBar">
        <div class="progress-times"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
      </div>
      <div class="player-controls-wrapper">
        <div class="controls">
          <div class="main-controls">
            <button id="prevButton"><i class="ri-rewind-fill"></i></button>
            <button class="play-button" id="playPauseButton"><i class="ri-play-circle-fill"></i></button>
            <button id="nextButton"><i class="ri-speed-fill"></i></button>
          </div>
        </div>
      </div>
    </div>
    <div class="lyrics-view" id="lyricsContainer">
      <div class="lyrics-content-spacer"></div>
      <div class="lyrics-scroll-container" id="lyricsContent">
        <div class="lyrics-status-container"><i class="ri-music-2-line"></i><span>Play a song to see lyrics</span></div>
      </div>
      <div class="lyrics-content-spacer"></div>
    </div>
    <button id="loopButton" title="Loop"><i class="ri-repeat-line"></i></button>
    <button id="lyricsButton" title="Lyrics"><i class="ri-chat-quote-line"></i></button>
  </div>

  <div class="box right" id="rightBox">
    <div class="right-inner-wrapper">
      <div id="searchView" class="view-section view-active">
        <div class="right-search">
          <i class="ri-search-line"></i>
          <input type="text" placeholder="Search songs, artists, albums…" id="searchInput" autocomplete="off">
        </div>
        <div class="search-results" id="searchResults">
          <div class="empty-state"><i class="ri-search-eye-line"></i><span>Search anything</span></div>
        </div>
        <div id="instanceStatus">connecting…</div>
      </div>
    </div>
  </div>
</div>

<div id="modalOverlay">
  <div id="failModal">
    <div id="modalContent">Could not play this track.</div>
    <div id="modalButtonContainer"><button id="modalButton">OK</button></div>
  </div>
</div>

<script>
(async function () {
  // ── INSTANCES (same community Tidal API proxies that Monochrome uses) ──
  const INSTANCES_URL = 'https://raw.githubusercontent.com/EduardPrigoana/hifi-instances/refs/heads/main/instances.json';
  const FALLBACK = [
    'https://monochrome-api.samidy.com','https://api.monochrome.tf',
    'https://hifi.geeked.wtf',
    'https://wolf.qqdl.site','https://maus.qqdl.site','https://vogel.qqdl.site',
    'https://katze.qqdl.site','https://hund.qqdl.site','https://tidal.401658.xyz',
    'https://triton.squid.wtf','https://tidal.squid.wtf',
  ];
  let instances = [...FALLBACK];
  let activeInstance = null;

  async function loadInstances() {
    try {
      const r = await fetch(INSTANCES_URL, { signal: AbortSignal.timeout(6000) });
      if (!r.ok) throw 0;
      const data = await r.json();
      const all = [];
      for (const [,cfg] of Object.entries(data.api || {})) {
        if (Array.isArray(cfg.urls)) all.push(...cfg.urls);
      }
      if (all.length) instances = [...all, ...FALLBACK];
    } catch {}
  }

  function setStatus(t) { const el = document.getElementById('instanceStatus'); if(el) el.textContent = t; }

  async function findInstance() {
    setStatus('connecting…');
    for (const base of instances) {
      try {
        const url = base.replace(/\/$/,'') + '/search/?s=billie+eilish';
        const r = await fetch(url, { signal: AbortSignal.timeout(5000) });
        if (r.ok || r.status === 400 || r.status === 404) {
          activeInstance = base.replace(/\/$/,'');
          setStatus('● ' + new URL(activeInstance).hostname);
          return;
        }
      } catch {}
    }
    setStatus('⚠ no server found — try reloading');
  }

  async function api(path) {
    const list = activeInstance
      ? [activeInstance, ...instances.map(i=>i.replace(/\/$/,'')).filter(i=>i!==activeInstance)]
      : instances.map(i=>i.replace(/\/$/,''));
    for (const base of list) {
      try {
        const r = await fetch(base + path, { signal: AbortSignal.timeout(9000) });
        if (r.status === 429) { setStatus('⚠ rate limited'); throw new Error('ratelimit'); }
        if (r.ok) { activeInstance = base; setStatus('● ' + new URL(base).hostname); return await r.json(); }
      } catch(e) { if(e.message==='ratelimit') throw e; }
    }
    throw new Error('All instances failed');
  }

  // ── STREAM ──
  function extractUrl(manifest) {
    try {
      const d = atob(manifest);
      try { const p = JSON.parse(d); if(p?.urls?.[0]) return p.urls[0]; } catch {}
      const m = d.match(/https?:\/\/[\w\-.~:?#[@!$&'()*+,;=%/]+/);
      return m ? m[0] : null;
    } catch { return null; }
  }

  async function getStream(id, quality='LOSSLESS') {
    const data = await api(`/track/?id=${id}&quality=${quality}`);
    const entries = Array.isArray(data) ? data : [data];
    let info=null, orig=null;
    for(const e of entries) {
      if(!e||typeof e!=='object') continue;
      if(!info && 'manifest' in e) info=e;
      if(!orig && e.OriginalTrackUrl) orig=e.OriginalTrackUrl;
    }
    if(orig) return orig;
    if(info?.manifest) { const u=extractUrl(info.manifest); if(u) return u; }
    if(quality!=='HIGH') return getStream(id,'HIGH');
    throw new Error('no stream');
  }

  function coverUrl(id, size=640) {
    if(!id) return null;
    return `https://resources.tidal.com/images/${id.replace(/-/g,'/')}/${size}x${size}.jpg`;
  }

  // ── STATE ──
  const audio = document.getElementById('audioEl');
  let queue=[], idx=-1, repeat=false, seeking=false, eqTimer=null;
  let favs = JSON.parse(localStorage.getItem('vapor_favs')||'[]');

  // ── DOM ──
  const $=id=>document.getElementById(id);
  const wrap=$('wrapper'), cover=$('coverArt'), titleEl=$('songTitle'), artistEl=$('songArtist');
  const heart=$('nowPlayingHeart'), bar=$('progressBar'), ctEl=$('currentTime'), durEl=$('duration');
  const eqViz=$('eqVisualizer'), eqBars=document.querySelectorAll('.eq-bar');
  const playBtn=$('playPauseButton'), playIco=playBtn.querySelector('i');
  const lyrWrap=$('lyricsContainer'), lyrContent=$('lyricsContent');
  const srInput=$('searchInput'), srList=$('searchResults');
  const modal=$('modalOverlay'), modalMsg=$('modalContent'), modalOK=$('modalButton');

  const fmt=s=>{s=Math.floor(s||0);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const isFav=id=>favs.some(f=>f.id==id);
  function toggleFav(t){isFav(t.id)?favs=favs.filter(f=>f.id!=t.id):favs.push(t);localStorage.setItem('vapor_favs',JSON.stringify(favs));}
  function setHeart(id){const f=isFav(id);heart.className='ri-'+(f?'heart-fill fav':'heart-line');heart.id='nowPlayingHeart';}
  function showModal(m){modalMsg.textContent=m;modal.classList.add('visible');}

  function qualBadge(item) {
    const tags=item.mediaMetadata?.tags||[];
    if(tags.some(t=>/HIRES|HI_RES|MQA|MASTER/.test(t))) return '<span class="quality-badge hires">HiRes</span>';
    if(tags.some(t=>/LOSSLESS|HIFI/.test(t))||item.audioQuality==='LOSSLESS') return '<span class="quality-badge lossless">FLAC</span>';
    return '';
  }

  // ── LOAD & PLAY ──
  async function load(i) {
    if(i<0||i>=queue.length) return;
    idx=i; const t=queue[i];
    document.querySelectorAll('.result-item').forEach((el,j)=>el.classList.toggle('active',j===i));
    titleEl.textContent=t.title; artistEl.textContent=t.artist; setHeart(t.id);
    bar.value=0; bar.style.background='rgba(var(--cb),.2)'; bar.classList.add('visible');
    ctEl.textContent='0:00'; durEl.textContent=fmt(t.duration);
    const cu=coverUrl(t.coverId);
    if(cu){const img=new Image();img.src=cu;img.onload=()=>{cover.innerHTML='';cover.appendChild(img);img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:14px;transition:transform .4s ease,opacity .4s ease';};img.onerror=()=>{cover.innerHTML='<i class="ri-music-2-fill"></i>';};}
    else cover.innerHTML='<i class="ri-music-2-fill"></i>';
    audio.pause(); audio.src=''; setPlayState(false);
    fetchLyrics(t.title, t.artist);
    try {
      const url=await getStream(t.id);
      audio.src=url; audio.load();
      const p=audio.play(); if(p) p.catch(()=>setPlayState(false));
    } catch(e) { showModal(`Couldn't stream "${t.title}". Try another.`); }
  }

  audio.addEventListener('play',()=>setPlayState(true));
  audio.addEventListener('pause',()=>setPlayState(false));
  audio.addEventListener('ended',()=>{ if(repeat){audio.currentTime=0;audio.play();}else if(idx<queue.length-1)load(idx+1);else setPlayState(false); });
  audio.addEventListener('timeupdate',()=>{
    if(seeking||!audio.duration) return;
    const t=audio.currentTime,d=audio.duration;
    bar.max=d; bar.value=t;
    bar.style.background=`linear-gradient(to right,var(--accent) ${(t/d)*100}%,rgba(var(--cb),.2) ${(t/d)*100}%)`;
    ctEl.textContent=fmt(t); durEl.textContent=fmt(d); syncLyrics(t);
  });
  audio.addEventListener('error',()=>{ if(idx<queue.length-1) load(idx+1); });

  function setPlayState(p) {
    playIco.className=p?'ri-pause-circle-fill':'ri-play-circle-fill';
    cover.classList.toggle('paused',!p);
    p?startEq():stopEq();
  }

  const eqH=[.15,.15,.15,.15,.15];
  function startEq(){stopEq();eqViz.classList.add('playing');eqTimer=setInterval(()=>{eqBars.forEach((b,i)=>{eqH[i]=eqH[i]*.6+(.2+Math.random()*.8)*.4;b.style.transform=`scaleY(${eqH[i]})`;});},120);}
  function stopEq(){if(eqTimer){clearInterval(eqTimer);eqTimer=null;}eqViz.classList.remove('playing');eqBars.forEach(b=>b.style.transform='scaleY(.15)');}

  $('playPauseButton').addEventListener('click',()=>{if(idx===-1)return;audio.paused?audio.play():audio.pause();});
  $('prevButton').addEventListener('click',()=>{if(idx>0)load(idx-1);});
  $('nextButton').addEventListener('click',()=>{if(idx<queue.length-1)load(idx+1);});
  $('loopButton').addEventListener('click',()=>{repeat=!repeat;$('loopButton').classList.toggle('active',repeat);});
  $('lyricsButton').addEventListener('click',()=>{wrap.classList.toggle('lyrics-mode');if(wrap.classList.contains('lyrics-mode')&&activeLyricIdx!==-1)setTimeout(()=>scrollLyric(),450);});
  heart.addEventListener('click',()=>{if(idx===-1)return;toggleFav(queue[idx]);setHeart(queue[idx].id);const a=document.querySelector('.result-item.active');if(a){const b=a.querySelector('.favorite-btn');if(b)b.className=(isFav(queue[idx].id)?'ri-heart-fill':'ri-heart-line')+' favorite-btn';}});

  bar.addEventListener('mousedown',()=>seeking=true);
  bar.addEventListener('touchstart',()=>seeking=true,{passive:true});
  bar.addEventListener('change',()=>{seeking=false;audio.currentTime=parseFloat(bar.value);syncLyrics(audio.currentTime);});
  bar.addEventListener('input',()=>{if(seeking)ctEl.textContent=fmt(bar.value);});

  document.addEventListener('keydown',e=>{
    if(e.target===srInput)return;
    if(e.code==='Space'){e.preventDefault();$('playPauseButton').click();}
    else if(e.code==='ArrowRight')audio.currentTime=Math.min(audio.duration||0,audio.currentTime+10);
    else if(e.code==='ArrowLeft')audio.currentTime=Math.max(0,audio.currentTime-10);
  });
  modalOK.addEventListener('click',()=>modal.classList.remove('visible'));
  modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('visible');});

  // ── SEARCH ──
  let sTimer=null, sPage=0, sLoading=false, sQuery='';

  srInput.addEventListener('input',()=>{
    clearTimeout(sTimer);
    sTimer=setTimeout(()=>{
      const q=srInput.value.trim();
      if(q){sQuery=q;sPage=0;queue=[];idx=-1;doSearch(q,0,true);}
      else{srList.innerHTML='<div class="empty-state"><i class="ri-search-eye-line"></i><span>Search anything</span></div>';queue=[];}
    },350);
  });

  function findItems(data,key){
    if(!data||typeof data!=='object')return[];
    if(Array.isArray(data)){for(const x of data){const r=findItems(x,key);if(r.length)return r;}return[];}
    if(key in data&&data[key]&&'items' in data[key])return data[key].items||[];
    if('items' in data&&Array.isArray(data.items))return data.items;
    for(const v of Object.values(data)){const r=findItems(v,key);if(r.length)return r;}
    return[];
  }

  async function doSearch(q,page,isNew){
    if(sLoading)return;
    sLoading=true;
    if(isNew){srList.innerHTML='';for(let i=0;i<6;i++){const s=document.createElement('div');s.className='skeleton-item';srList.appendChild(s);}}
    try{
      const data=await api(`/search/?s=${encodeURIComponent(q)}`);
      const items=findItems(data,'tracks');
      if(isNew)srList.innerHTML='';
      if(!items.length&&isNew){srList.innerHTML='<div class="empty-state"><i class="ri-close-circle-line"></i><span>No results found</span></div>';sLoading=false;return;}
      items.forEach((item)=>{
        const t={
          id:item.id,
          title:item.version?`${item.title} (${item.version})`:item.title,
          artist:(item.artists||[]).map(a=>a.name).join(', ')||item.artist?.name||'Unknown',
          coverId:item.album?.cover||null,
          duration:item.duration||0,
          mediaMetadata:item.mediaMetadata,
          audioQuality:item.audioQuality,
        };
        const qi=queue.length; queue.push(t);
        const el=document.createElement('div'); el.className='result-item';
        if(qi===idx)el.classList.add('active');
        const cu=coverUrl(t.coverId,160);
        const fav=isFav(t.id);
        el.innerHTML=`<div class="result-art">${cu?`<img src="${cu}" loading="lazy" onerror="this.parentElement.innerHTML='<i class=\\'ri-music-2-fill\\'></i>'">`:'<i class="ri-music-2-fill"></i>'}</div><div class="result-text"><div class="result-title">${esc(t.title)}${qualBadge(item)}</div><div class="result-artist">${esc(t.artist)}</div></div><i class="${fav?'ri-heart-fill':'ri-heart-line'} favorite-btn"></i>`;
        el.addEventListener('click',e=>{
          if(e.target.classList.contains('favorite-btn')){e.stopPropagation();toggleFav(t);e.target.className=(isFav(t.id)?'ri-heart-fill':'ri-heart-line')+' favorite-btn';if(idx!==-1&&queue[idx]?.id===t.id)setHeart(t.id);return;}
          load(qi);
        });
        srList.appendChild(el);
      });
      if(items.length>=10){
        const s=document.createElement('div');s.style.cssText='height:10px;flex-shrink:0';srList.appendChild(s);
        const obs=new IntersectionObserver(entries=>{if(entries[0].isIntersecting&&!sLoading){obs.disconnect();s.remove();sPage++;doSearch(sQuery,sPage,false);}},{root:srList,threshold:0.1});
        obs.observe(s);
      }
    }catch(e){
      if(isNew)srList.innerHTML=`<div class="empty-state"><i class="ri-wifi-off-line"></i><span>${e.message==='ratelimit'?'Rate limited — wait a moment':'Search failed.'}</span></div>`;
    }
    sLoading=false;
  }

  // ── LYRICS ──
  let lyrics=[], activeLyricIdx=-1, lyricsOn=false;
  let manualScroll=false, manualTimeout=null, scrollAnim=null;

  async function fetchLyrics(title,artist){
    lyrContent.innerHTML='<div class="lyrics-status-container"><div class="loading-wave"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    lyrics=[];activeLyricIdx=-1;lyricsOn=false;
    const ct=title.replace(/\(Official.*?\)/gi,'').replace(/\[.*?\]/g,'').replace(/ft\..*$/i,'').replace(/feat\..*$/i,'').trim();
    const ca=artist.replace(/,.*$/,'').replace(/\s*-\s*Topic$/i,'').replace(/VEVO$/i,'').trim();
    const urls=[
      `https://lrclib.net/api/get?artist_name=${encodeURIComponent(ca)}&track_name=${encodeURIComponent(ct)}`,
      `https://lrclib.net/api/search?artist_name=${encodeURIComponent(ca)}&track_name=${encodeURIComponent(ct)}`,
      `https://lrclib.net/api/search?q=${encodeURIComponent(ct+' '+ca)}`,
    ];
    let best=null;
    for(const u of urls){
      try{const r=await fetch(u,{signal:AbortSignal.timeout(5000)});if(!r.ok)continue;const d=await r.json();const arr=Array.isArray(d)?d:[d];const c=arr.find(x=>x.syncedLyrics)||arr.find(x=>x.plainLyrics)||arr[0];if(c&&!c.code){best=c;break;}}catch{}
    }
    if(!best){lyrContent.innerHTML='<div class="lyrics-status-container"><i class="ri-close-circle-line"></i><span>No lyrics found</span></div>';return;}
    if(best.instrumental){lyrContent.innerHTML='<div class="lyrics-status-container"><i class="ri-music-2-line"></i><span>Instrumental</span></div>';}
    else if(best.syncedLyrics){parseLrc(best.syncedLyrics);renderLyrics();}
    else if(best.plainLyrics){lyrContent.innerHTML=`<div class="lyric-line active" style="font-size:1rem;opacity:.8;white-space:pre-wrap;line-height:1.6;cursor:default;">${esc(best.plainLyrics)}</div>`;}
    else{lyrContent.innerHTML='<div class="lyrics-status-container"><i class="ri-close-circle-line"></i><span>No lyrics found</span></div>';}
  }

  function parseLrc(lrc){
    lyrics=[];
    lrc.split('\n').forEach(line=>{
      const m=line.match(/^\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
      if(m){const time=+m[1]*60+ +m[2]+(m[3].length===3?+m[3]:+m[3]*10)/1000;const text=m[4].trim();if(text)lyrics.push({time,text});}
    });
  }

  function renderLyrics(){
    lyrContent.innerHTML='';
    lyrics.forEach((l,i)=>{
      const d=document.createElement('div');d.className='lyric-line future';d.id=`lyric-${i}`;d.textContent=l.text;
      d.addEventListener('click',()=>{audio.currentTime=l.time;manualScroll=false;lyrWrap.classList.remove('manual-mode');clearTimeout(manualTimeout);if(audio.paused)audio.play();});
      lyrContent.appendChild(d);
    });
    lyricsOn=true;
  }

  function syncLyrics(t){
    if(!lyricsOn||!lyrics.length)return;
    let ni=-1;for(let i=0;i<lyrics.length;i++){if(lyrics[i].time<=t)ni=i;else break;}
    if(ni!==activeLyricIdx){activeLyricIdx=ni;updateLyricsUI();if(!manualScroll)scrollLyric();}
  }

  function updateLyricsUI(){
    document.querySelectorAll('.lyric-line').forEach((el,i)=>{
      el.className='lyric-line';
      if(i<activeLyricIdx)el.classList.add('past');
      else if(i===activeLyricIdx){el.classList.add('active');if(audio.paused)el.classList.add('paused');}
      else{el.classList.add('future');const d=i-activeLyricIdx;if(d<=5)el.classList.add(`future-${d}`);}
    });
  }

  function scrollLyric(){
    if(activeLyricIdx===-1)return;
    const line=document.getElementById(`lyric-${activeLyricIdx}`);if(!line)return;
    const tgt=line.offsetTop-lyrWrap.clientHeight/2+line.clientHeight/2;
    const start=lyrWrap.scrollTop,dist=tgt-start;if(Math.abs(dist)<2)return;
    const t0=performance.now();
    function step(now){const p=Math.min((now-t0)/400,1);const e=p<.5?2*p*p:-1+(4-2*p)*p;lyrWrap.scrollTop=start+dist*e;if(p<1)scrollAnim=requestAnimationFrame(step);else scrollAnim=null;}
    if(scrollAnim)cancelAnimationFrame(scrollAnim);
    scrollAnim=requestAnimationFrame(step);
  }

  lyrWrap.addEventListener('wheel',onManual,{passive:true});
  lyrWrap.addEventListener('touchmove',onManual,{passive:true});
  function onManual(){
    if(!lyricsOn)return;if(scrollAnim){cancelAnimationFrame(scrollAnim);scrollAnim=null;}
    manualScroll=true;lyrWrap.classList.add('manual-mode');clearTimeout(manualTimeout);
    manualTimeout=setTimeout(()=>{manualScroll=false;lyrWrap.classList.remove('manual-mode');scrollLyric();},2000);
  }

  // ── SCALE ──
  function scale(){wrap.style.transform=`scale(${Math.min(1,window.innerWidth*.95/750,window.innerHeight*.95/600)})`;}
  window.addEventListener('resize',scale);scale();

  // ── INIT ──
  await loadInstances();
  findInstance();

})();
</script>
</body>
</html>
